<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#087f8c" />
    <title>My Budget Management Offline</title>
    <style>
      :root {
        color-scheme: light;
        background: #f6f8f7;
        color: #17201c;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: linear-gradient(180deg, #f8fbfa 0%, #f6f8f7 100%);
      }
      main {
        max-width: 420px;
        border: 1px solid #dbe5e1;
        border-radius: 24px;
        background: white;
        padding: 24px;
        box-shadow: 0 18px 45px rgba(23, 32, 28, 0.08);
      }
      h1 {
        margin: 0;
        font-size: 1.6rem;
      }
      p {
        color: #63706a;
        font-weight: 650;
        line-height: 1.55;
      }
      a {
        color: #087f8c;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Offline</h1>
      <p>My Budget Management cannot reach the network right now. Reconnect and reopen the app to load your private finance data.</p>
      <a href="/dashboard">Try dashboard again</a>
    </main>
  </body>
</html>
